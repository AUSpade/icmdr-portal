<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>iCmdr – SES Command Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>

<body>

<div id="loginScreen" class="login">

<div class="login-card">

<h1>iCmdr</h1>
<p>SES Command System</p>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginErr" class="error">Invalid login</p>

</div>

</div>

<div id="app">

<header>

<div class="logo">
🚨 iCmdr
</div>

<div class="user">
<span id="menuUser"></span>
<button onclick="logout()">Logout</button>
</div>

</header>

<div class="layout">

<aside class="sidebar">

<button onclick="openScreen('dashboard')">Dashboard</button>

<button onclick="openScreen('availability')">Availability</button>

<button onclick="openScreen('roster')">Roster</button>

<button id="umtButton" onclick="openScreen('umt')">UMT</button>

</aside>

<main>

<section id="dashboard" class="screen active">

<h2>Operational Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Members Available</h3>
<p id="dashMembers">0</p>
</div>

<div class="card">
<h3>UDO On Duty</h3>
<p id="dashUDO">—</p>
</div>

<div class="card">
<h3>Vehicles Ready</h3>
<p>3</p>
</div>

<div class="card">
<h3>Active Incidents</h3>
<p>0</p>
</div>

</div>

</section>

<section id="availability" class="screen">

<h2>My Availability</h2>

<div id="availabilityGrid"></div>

</section>

<section id="roster" class="screen">

<h2>Unit Roster</h2>

<div id="rosterView"></div>

</section>

<section id="umt" class="screen">

<h2>Unit Management Tool</h2>

<div class="umt-create">

<h3>Add Member</h3>

<input id="addName" placeholder="Full name">
<input id="addUsername" placeholder="Username">
<input id="addPassword" placeholder="Password">
<input id="addNumber" placeholder="Member number">

<select id="addRank"></select>
<select id="addGroup"></select>

<button onclick="createUser()">Create Member</button>

</div>

<hr>

<div id="memberList"></div>

</section>

</main>

</div>

<footer>

iCmdr Proof of Concept – SES Morwell

</footer>

</div>

</body>
</html>
